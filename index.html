<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIA — Dashboards</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1923;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 850px;
      padding: 40px;
    }

    .logo {
      font-size: 44px;
      font-weight: bold;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #6b8299;
      font-size: 18px;
      margin-bottom: 45px;
    }

    .cards {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: linear-gradient(135deg, #162333, #101923);
      border: 1px solid #1e3348;
      border-radius: 18px;
      padding: 34px;
      min-width: 240px;
      text-decoration: none;
      color: white;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #2d6a9f;
      background: linear-gradient(135deg, #1d3650, #142233);
    }

    .year {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .label {
      color: #9fb3c8;
      font-size: 15px;
    }

    .note {
      margin-top: 45px;
      font-size: 13px;
      color: #6b8299;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">CIA</div>
    <div class="subtitle">Centre International d’Antibes — Dashboards internes</div>

    <div class="cards">
      <a class="card" href="CIA_2023_Dashboard.html">
        <div class="year">2023</div>
        <div class="label">Ouvrir le dashboard 2023</div>
      </a>

      <a class="card" href="CIA_2024_Dashboard.html">
        <div class="year">2024</div>
        <div class="label">Ouvrir le dashboard 2024</div>
      </a>
    </div>

    <div class="note">
      Analyse interne — Accès réservé
    </div>
  </div>
</body>
</html>
