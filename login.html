<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>CIA — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070c14;--bg2:#0b1220;--bg3:#0f1a2e;--bd:#1a2e48;--bd2:#243d5e;
  --tx:#c8d8e8;--tx2:#6b8299;--tx3:#8faab8;
  --ac:#2d6a9f;--gr:#2ecc71;--rd:#e74c3c;
}
body{
  background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;overflow:hidden;position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 30%, rgba(45,106,159,.12), transparent),
    radial-gradient(ellipse 60% 50% at 70% 70%, rgba(68,147,125,.10), transparent);
  pointer-events:none;
}
.card{
  background:var(--bg2);
  border:1px solid var(--bd);
  border-radius:18px;
  padding:36px 32px 30px;
  width:100%;max-width:420px;
  position:relative;z-index:1;
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.logo{
  font-size:30px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#2d6a9f,#44937d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px;
}
.tag{
  font-size:10px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;
  font-family:'Space Mono',monospace;margin-bottom:28px;
}
h1{
  font-size:20px;font-weight:700;color:#e8edf2;margin-bottom:6px;
}
.sub{
  font-size:13px;color:var(--tx3);margin-bottom:24px;line-height:1.5;
}
.grp{margin-bottom:16px}
label{
  display:block;font-size:10px;color:var(--tx2);text-transform:uppercase;
  letter-spacing:1.5px;font-weight:600;margin-bottom:6px;
}
input[type="email"],input[type="password"]{
  width:100%;padding:11px 14px;background:var(--bg);
  border:1px solid var(--bd);color:#e8edf2;border-radius:8px;
  font-size:14px;font-family:'Inter',sans-serif;transition:.15s;
}
input:focus{
  outline:none;border-color:var(--ac);
  box-shadow:0 0 0 3px rgba(45,106,159,.18);
}
.btn{
  width:100%;padding:12px 16px;background:var(--ac);
  border:none;color:#fff;border-radius:8px;font-size:14px;
  font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;
  transition:.15s;margin-top:8px;
}
.btn:hover:not(:disabled){background:#1a4f7f}
.btn:disabled{opacity:.6;cursor:wait}
.err{
  display:none;background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);
  color:var(--rd);padding:10px 14px;border-radius:8px;font-size:12px;
  margin-bottom:14px;
}
.err.show{display:block}
.notice{
  background:rgba(46,204,113,.08);border:1px solid rgba(46,204,113,.25);
  color:var(--gr);padding:10px 14px;border-radius:8px;font-size:12px;
  margin-bottom:14px;
}
.foot{
  margin-top:22px;padding-top:18px;border-top:1px solid var(--bd);
  font-size:11px;color:var(--tx2);font-family:'Space Mono',monospace;
  text-align:center;letter-spacing:.5px;
}
.foot .dot{
  display:inline-block;width:6px;height:6px;background:var(--gr);
  border-radius:50%;margin-right:5px;box-shadow:0 0 6px var(--gr);
}
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .8s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CIA</div>
  <div class="tag">Centre International d'Antibes</div>

  <h1>Connexion</h1>
  <div class="sub">Accès réservé au dashboard interne.</div>

  <div class="notice" id="logoutNotice" style="display:none">
    Vous avez été déconnecté. À bientôt !
  </div>
  <div class="err" id="errBox"></div>

  <form id="loginForm" autocomplete="on">
    <div class="grp">
      <label for="username">Identifiant</label>
      <input type="text" id="username" name="username" autocomplete="username"
             required autofocus autocapitalize="off" spellcheck="false">
    </div>
    <div class="grp">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">Se connecter</button>
  </form>

  <div class="foot"><span class="dot"></span>Connexion sécurisée · Session 30 jours</div>
</div>

<script>
(function(){
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/index.html';

  if (params.get('logout') === '1') {
    document.getElementById('logoutNotice').style.display = 'block';
  }

  function showError(msg){
    const el = document.getElementById('errBox');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearError(){ document.getElementById('errBox').classList.remove('show'); }

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    clearError();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Connexion…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value,
          next: next
        })
      });

      const data = await res.json().catch(function(){ return {}; });

      if (res.ok && data.ok) {
        // Petite pause pour s'assurer que le cookie est bien posé
        setTimeout(function(){ location.href = data.next || next; }, 100);
      } else {
        showError(data.error || ('Erreur ' + res.status));
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    } catch (err) {
      showError('Erreur réseau : ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    }
  });
})();
</script>
</body>
</html>
